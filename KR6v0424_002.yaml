body:
  text: 四明鴻苞居士屠隆著或問經云若欲懺悔者端居念實相衆罪如霜露慧日能消除大珠和尚曰見性人猶如積草等須彌山只用一星之火業障如草智慧似火乃釋迦已證如來尚不能免九惱何以故爾答日火能消衆罪者見般若之大勸人不可不修行如來不能免九惱者見業力之重戒人不可造罪如來受報為世人作榜樣受猶不受也是故如來而不免受報何况凡夫寧逃定業如來而不免滅度何况凡夫寧免無常問聞聲悟道聲聞人與觀自在同而大小乘云胡分別答聲聞人聞聲而斷集入滅證偏空之理觀自在聞聲而入流忘所開圓通之門大小二乘所以逈別問十二因緣單為緣覺人說耶答有小乘十二因緣有菩薩十二因緣小乘悟因緣而滅色入空所以局於自了菩薩悟因緣而即色即空所以弘於普度問天台四教分藏通別圓人病其教支離瑣碎然否答道惟一乘分為四教為是衆生機器不同不得不爾柯條分布根本同歸必言台教云云者則華嚴三賢十聖亦屬支離楞嚴七處八還亦名瑣碎且智者大師得悟法華三昧徹見靈山一會儼然未散傳佛心印烏可輕詆也問千經萬卷一字一句皆有妙理皆有妙解狗子無佛性一語𤢜不可解如何舉揚答妙正在不可解問經云善男子我等住於無念法中得如是金色三十二相放大光明照無餘世界不可思議功德佛說之猶不盡何况餘乘能知也得無念者六根無染故自然得入諸佛知見得如是者即名佛藏亦名法藏即能一切佛一切法何以故為無念故經云一切諸佛等皆從此經出既稱無念入佛知見復從何立𣷸無念立無想天滅盡心想亦是無念如何不得入佛知見名為外道答佛言無念無妄念正念不灰滅般若智在故外道言無想正念灰滅無般若智熏觀故問何名般若答般若無口眼無名相無念無無念無為無無為無淨無無淨遍一切處不住一切處不住一切處遍一切處如大火聚不泊一物物物皆然如大圓鏡不立一像像像悉現問如何是妄念答𡚶無聖凡只要念不住聖念若住聖念即是𡚶念凡念不住凡念即是正念所謂妄念寧獨外牽塵緣內起塵念如經所云雖修空不以空為證不得作空想雖修定不以定為證不得作定想雖得淨不以淨為證不得作淨想若有所得即作得想即是𡚶念不名解脫或問大珠和尚曰此頓門以何為宗以何為旨以何為體以何為用答無念為宗𡚶心不起為旨以清淨為體以智為用問既言無念為宗未審無念者無何念答無念者無邪念非無正念問何名邪念何名正念答念有念無即名邪念不念有無即名正念念善念惡名為邪念不念善惡即名正念乃至苦樂生滅取捨怨親憎愛並名邪念不念苦樂等即名正念問云何是正念答正念者惟念菩提問菩提可得否答菩提不可得問既不可得云何惟念菩提答只如菩提假立名字實不可得亦無前後得者為不可得故即無有念只箇無念是名真念菩提問既言以智為用者云何為智答知二性空即是解脫知二性不空不得解脫是名為智亦名了邪正亦名識體用二性空即是體知二性空即是解脫更不生疑即名為用言二性空者不生有無善惡愛憎名二性空昔人問禪師聞鴉鳴否曰聞鴉飛去問聞否曰聞問鴉鳴故聞鴉飛去何故復言聞答塵會去聞性不滅故人問木殊和尚曰對一切色像時即名為見不對色像時亦名見否答見問對物時有見不對物時云何有見答今言見者不論對物與不對物何以故為見性常故有物之時即見無物之時亦見也故知物自有去來見性無去來也問正見物時見中有物否答見中不立物問正見無物時見中有無物否答見中不立無物問定能生慧慧亦能生定否答慧之生定更疾于定之生慧定之生慧如定水不波諸物盡照慧之生定如慧燈一朗陰怪盡滅妙喜曰諸方說靜了方悟我是悟了方靜未悟時心識紛飛悟了時方貼貼地問淨土十六觀觀欄楯羅網寶樹樓閣金沙蓮池寶地樂華彌陀大士妙相纓珞種種結想種種熏觀得無礙空觀否答衆生想念人世一切塵緣悉為心障此想自多生以來機久根熟移此想而觀淨土勝妙諸境積久熏心塵緣頓盡且十六觀者即觀即空即假即中般若中熏原無住著何礙之有問若說菩提心不住一切處亦無住處亦無無住處心淨時不住于淨心空時不住于空一切過去未來現在都不住此時修淨土人還教住于淨土否答若到此時連西方也不住問連西方也不住莫恐生西方便不成否答連西方也不住生西方是等間或問定慧于居士居士曰汝謂定慧如何曰泰山崩雷電擊虎狼逼心屹不動是定隔壁見一切物千萬人舉心動念皆能了知千百世過去未來事皆能照見是慧曰汝莫作是念汝若作是念定慧不成早已著魔了問如何是定慧答一切善惡悉能分別是慧於所分別之處不起愛憎不隨所染是定問受罪衆生有佛性否答有佛性問既有佛性正入地獄時佛性同入否答亦同入問既同入衆生受罪佛性亦同受罪否答佛性雖同衆生入地獄是衆生受罪佛性不受問既同入因何不受答衆生受罪時佛性已化為識神是識神受罪非佛性受罪問佛性既已化為識神如何說佛性同入答佛性已化為識神故識神受罪識神元是佛性故佛性同入譬如梨園扮演帝王者帝王偶扮罪人是罪人受罪非帝王受罪罪人元是帝王扮故云帝王同入受罪元是罪人故云帝王不受罪罪人受罪已畢依舊帝王地獄識神受罪已畢依舊佛性問如何是常不離佛答心無起滅對境寂然一切時中畢竟空寂即是常不離佛心若有起滅念佛佛在口上拜佛佛在膝上覩佛佛在眼上心若無起滅佛在心中問不思善不思惡惡不可思善如何也不思善既不思還復思惡耶答善且不思何况于惡一切不思又非無記廓然洞然乃證真空問一切不思定是無記如何又非無記答為有廓然洞然意思在問真如之性為實空為實不空若言不空即是有相若言空者即是斷滅此意云何答亦空亦不空一切法中絶愛憎取舍諸相是名亦空於無相體中具足恆沙萬法是名亦不空於萬法中絶愛憎取舍是空而即含不空萬法具足而畢竟絶愛憎去取舍是不空而即舍空對空有不空之名今非空故無不空對不空有空之名今非不空故無空問佛以度盡衆生為本願一物不度不取正覺如何衆生至今還度不盡佛得無成誑語否答度盡衆生是佛真實願何得為誑衆生為業力所牽自不能度衆生度不能盡而佛終不捨度盡衆生心所以為真實所以為不誑問佛度衆生心切否曰切佛之求人甚於人之求佛問人有求佛而佛不應者何曰是信不及問信矣如何曰為是心不專問專矣如何曰心專亦難說念頭有淨有穢是不專有出有入是不專有定有亂是不專行道有作有輟是不專問畢竟專時如何曰畢竟專畢竟度問畢竟度者亦不見幢蓋來臨曰佛有密度有顯度顯度者幢蓋來臨是密度者使汝心開目明是然臨了到底幢蓋定來龍華有期靈山未散問無情是佛否答無情是佛者死人應是如來所謂無情為無凡情非無聖情問何名聖情何名凡情答無分別是非於一切境上法上不著不取是名聖情有分別是非於一切境上取著是名凡情無凡情有聖情有情亦是無情不是死人一般無情也問道人何故有神通凡夫却無答真性無礙便是神通為形相所礙神通不顯道人見性故空形相形相不礙故有神通非術非怪也鬼脫軀殼便有五通故知凡夫無通定是為形相所礙逹觀與田叔坐一狗子在桌下忽去師問田叔狗去桌子去否田叔無答余代為答曰桌子去師曰狗能去桌子是木安能去答佛下自天宮木佛出來迎彼木能來定知此木能去問有人乘船船底刺殺螺蜆為是人受罪為復船當罪曰俱不受罪罪從心生無心何罪官枉殺人罪坐官不坐劊子手宦有意劊子手無意也皂隸笞人人怨官不怨皂隸官有意皂隸無意也問誤殺衆生者未嘗有意得無罪否曰佛有禁戒不得誤殺衆生不留心禁戒便自有殺理烏得無罪以故殺者以故報以誤殺者以誤報問佛既普度衆生願力廣大乃又有不能度者何以故答大冶洪爐不問金銀銅錫叉釧簮環無一不鎔然不能鎔瓦石長天朗月不問江湖河海溪澗溝渠無一不映然不能映沙土問釋迦成道廣化有情摩登女一見證果獨城東老母終身不見佛此時此會尚爾無緣更復何時興起道念當是此媼定無佛性底答不然世間史無一無佛性底衆生此媼與釋迦無緣安知遇他佛時不便興起道念問地獄衆生正受罪時能念佛號一聲得出地獄否曰即出咦這一聲佛號詎同小可譬如日輪出空萬怪陵滅詔書頒赦萬罪俱銷問審如是者衆生造罪種種何不牢記此一聲到此時用著答衆生業重自障此時決不記得這一聲譬如人臨睡時作念我此番睡去决要作一好夢及至睡去隨緣夢來決不是先作念底夢一窹𥧌相隔便不由我作主何况生死相隔安能圖此僥幸惟一向念佛修行人偶犯地獄罪正受罪時舊根發起一聲佛號腳下便生蓮華理則有之問生前千聲佛號尚不免地獄死後一聲佛號何得頓爾脫離曰生前千聲佛號不免地獄者業力重故死後一聲佛號頓爾脫離者此一聲佛力重故問如來放眉閒白毫相光見東方萬八千國是實語否答佛性本極廣大包含虛空生大覺中僅如大海一漚何况東方萬八千國有人笑迦老云汝為淨飯王子何故說大𡚶語如來吐舌上至髮際曰汝曾見有如此舌人而說妄語者否蓋如來廣長舌從不𡚶語得也上至髮際特其小小者直滿三千大千世界問此語信甚難及答衆生謗人若謗聞一邑則將來舌滿一邑若謗聞一國則將來舌滿一國受犂耕之報豈况如來廣長舌不滿三千大千世界問此邦去淨土十萬億云胡往生者彈指可到答往生是佛性不是色身豈不彈指可到如人心識一動念便想到千萬里外且衆生心淨則土淨此土即是淨土蓋惟心淨土含褁三千大千此娑婆一國豈不即是淨土心穢則淨土遠於十萬億心淨則近于彈指故曰生則決定生去則實不去問人生有形殼故有箠楚痛苦死則形殼滅誰為受痛而云有地獄刀劍鑊湯諸苦答鞭生人則痛鞭死人則不痛受痛非形殼也人死形殼雖滅神識尚存安得不受痛苦人生有身死後亦有身問人死那得復有身答汝今日那得有汝身問千聖皆言蠢動含靈皆有佛性闡提亦有佛性𤢜興教大師天台傳佛心印云性具惡緣了修惡即是性惡何以故答性中元具染淨二緣淨即是善染即是惡就善說則云人人皆有佛性就惡說則云修惡性惡云修惡者乃名煩惱即菩提生死即涅槃若不云修惡則是菩提即菩提涅槃即涅槃矣是故說性善見人可修說性惡見人不可不修或謂居士曰子與宋大儒作對辨佛法兩廡下冷猪肉喫不成了居士笑曰長亝人正怕喫猪肉居士女死哭而無淚人問故答哭者俗諦無淚者真諦問哭有益乎曰無益閻王不放轉問哭有損乎曰有損深亡者愛河問畜生與人性命同乎曰同問人死多則有鬼猪羊死多無鬼何也答人畏人鬼故人有鬼不畏猪羊鬼故猪羊無鬼人夜見朽株以為鬼也而病日見其朽株也而病愈故知鬼只在人心問世間乃無鬼耶曰有世間之鬼由人心之鬼感見問世間有佛否曰有問佛多否曰多問佛如多者人何故不見曰佛見人人不見佛人障重故如人見螻蟻螻蟻不見人螻蟻障重故嗚呼人日睹雜色眼根不淨故不見佛相日聆雜聲耳根不淨故不聞佛音日馳雜想意根不淨故不通佛心一旦清淨玉毫現前總來是這箇文喜和尚終日禮拜文殊文殊不來一朝下來笟籬揮去人問坐禪作佛經論所說馬祖何故訶坐禪僧答只許心坐禪不許身坐禪心得禪定閙市都是蒲團心不得定蒲團却是閙市問淨曰在穢上得問寂曰在喧上得問佛曰在凡夫上得問有好道而不求信佛而不行如何答好道而不求還是不好信佛而不行還是不信問善人謗佛惡人讚佛如何答善人謗佛謗罪不以善減善因謗而消惡人讚佛惡罪不以讚減讚佛之功自在問愚人奉佛智人不奉佛如何答愚人奉佛奉佛之一念是智智人不奉佛不奉佛之一念是愚奉佛愚人到底成智不奉佛智人到底成愚誦比丘至愚也以奉佛故心契真如而證果崔司徒學究天人大智也以毀佛故禍在眉睫而不知問學道在人何關機緣答學道在人成道在機緣機緣未至阿難聽迦老四十九年說法而不悟機緣已至受迦葉一夜鉗錘而豁然機緣者是瓜熟蒂落水到渠成問修行人怕死是不怕死是答平日要怕死臨終時要不怕死平日怕死修行之心才切臨終不怕死去來之際泰然平日修行心中乃有柄柄在我臨終方得逍遙其怕也乃所以成其不怕平日只自優游臨終手腳忙亂其不怕也乃所以成其怕問人有三魂有諸答有問魂一而已云何能分而為三答倩女離魂一魂隨王秀才去一魂留父母旁有二則有三佛成道後千百億化身只是此魂所轉凡夫身坐一處心繞四天下一遍此便是千百億化身底光影問形殼與神識為是一物為是兩物答兩物問既是兩物應不相知云何形有疾痛心神便苦答一點神識落在母胎成形生出一向與此殼和合久了只為神認形太實黏做一塊所以苦痛相關人死之後形神已離為和合久故生前之病鬼猶知痛膠黏故也譬如骨肉兩人相處既久此人疾痛彼人悲苦亦以膠黏故也仙人煉神氣清虛便能調神出殼禪人煉成空觀焚燒形殼便似枯柴如衆生生前造罪死後罪業隨身亦只為自家識神知罪便被縈纏空觀若成罪即解脫問二十五有俱被這有縈縛流轉生死佛門三觀應說空門如何又說有門却不復者於有依舊流浪答不然二十五有為不能空應須說空二乘之人沉滯于空還須說有二十五有是執有故墮生死三千有門是大乘圓頓妙有故趣涅槃問荊溪大師心要有三惑有三觀有三諦有三智有三德何也答三惑者無明塵沙見思三觀者空假中三諦者中真俗三智者一切智道種智一切種智三德者般若德解脫德法身德三惑是病三觀是藥如來為衆生有三惑大病故設三觀妙藥對治三病空觀治見思病假觀治塵沙病中觀治無明病空觀是真諦泯一切法假觀是俗諦立一切法中觀是中諦統一切法由茲三觀破茲三惑證乎三智成乎三德因病設藥藥妙病除病既除已藥安所施是皆逆流尋源自然功用非如來藏中造作所得譬如人身有四百四種病須四百四種藥治豈得謂之支離問華嚴十信十住十行十回向十地等覺妙覺答十住十行十回向謂之三賢為賢位菩薩十地謂之十聖為聖位菩薩雖分賢聖皆大乘菩薩也十信者萬行之先三賢之首也經云信為道源功德母長養一切諸善法等覺謂之一生補處菩薩等于妙覺未逹一間妙覺如來極果也十信者信佛不疑决定要成佛信心成就便下手修行若信而不修不名為信從凡入聖必以此信為先導十住者謂從信心修行有所證入便住地不退轉故名十住十行者由十住進修得證佛道自得己利而利他之行未成是故隨順衆生廣行饒益作利人功行故名十行十𢌞向者起大悲心救度衆生回轉前十行之善向于三處三處者一真如實際是所證二無上菩提是所求三一切衆生是所度以度人善行回向此三處圓滿萬行等入法界也十地者菩薩修信住行向證得菩薩果位謂之地者菩薩證此果一切佛法依此發生如一切草木依地發生也住行向是修是菩薩因位故名三賢十地是證是菩薩果位故名十聖等妙二覺是佛位等覺破一品無明便入妙覺以其死一分無明生一分妙果故云一生補處補處者補妙覺處也問佛生滅滅已寂滅為樂得非是二乘人灰心絶慮入斷滅見否答二乘斷滅是滅心慮故為偏空如來寂滅是止滅生死妙用宛起故為真空居士閲唐宣律師傳夫人送供朝夕周旋嘗問天人以古佛蹟種種夫人應答如流服其淹博居士心極喜天人晤言杳然不見後覽經云二種比丘其一寡淺持戒誦經惟通一句天神贊護其一多聞廣覽經藏天神不贊多聞怒之天神曰彼比丘少聞言行相𮨇汝雖能博誦三藏行與經違居士乃矍然自省天神不至有由然矣當學慶喜盡掃見聞何如香嚴悉燒文字問何謂依正二報答正報者即五陰之身衆生隨其所作善惡之業各各感得此身正受其報故名正報依報者即世界國土衆生各各隨其果報之身依之而受報故名依報人間一切寒暑祥災水旱疾病等事皆是衆生作業感報亦可名依報問某聞三觀空假中又聞有三止何也答三止一體真止謂體逹無明顛倒之妄即是實相之真心得止寂是名體真止對空觀二方便隨緣止謂隨緣歷境善巧應用安心不動心得止寂是名方便隨緣止對假觀三離二邊分別止謂不分別生死涅槃有無斷常等二邊之相心得止寂是名離二邊分別止對中觀問請問三觀答詳大明三藏法數觀者照了之義三觀即具三諦之法若觀心空則一切法皆空即是真諦若觀心假則一切法皆假即是俗諦若觀心中則一切法皆中即是中諦此之三觀全由性發實匪修成故於一心宛有三用所謂一心三觀也空觀者離性離相之謂謂觀一念之心不在內不在外不在中間名之為空由觀一念空故一空一切空無假無中而不空以三觀皆能蕩相故也空蕩見思之相假蕩塵沙之相中蕩無明之相三相皆蕩即畢竟空是名空觀假觀者無法不備之謂謂觀一念之心具足一切諸法名之為假由觀一念假故一假一切假無空無中而不假以三觀皆能立法故也空立真諦之法假立俗諦之法中立中諦之法三法皆立即為妙假是名假觀中觀者即中正絶二邊對待之謂謂觀一念之心非空非假即空即假名之謂中由觀一念中故一中一切中無空無假而不中以三觀當處皆能絶待故也言空則空外無法言假則假外無法言中則中外無法三皆絶待即為圓中是名中觀問請問三諦答按三藏法數諦者諦審也謂諦審一切法即空即假即中即空是真諦即假是俗諦即中是中諦此三隔歷即是次第三諦三一無礙即是圓融三諦真諦者真即真空泯一切法之謂也蓋諸法本空衆生不了執之為實而生妄見若以空觀蕩之則實情自忘情忘自能離於諸相諸相若離則真空之理自然諦了故名真諦俗諦者俗即世俗立一切法之謂也諸法雖即本空皆不可得若以假觀照之則知性具諸法歷歷宛然世俗之用自然諦了故名俗諦中諦者中即中正統一切法之謂也諸法本來不離二邊不即二邊若以中觀觀之則知諸法非真非俗即真即俗清淨洞徹圓融無礙之理自然諦了故名中諦
