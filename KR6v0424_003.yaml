body:
  text: 四明鴻苞居士屠隆著問悉逹太子四門遊觀見生老病死因而出家雪山苦行六年成道度世為實為權願聞其說答悉逹干過去世已悟無常證位菩薩豈待四門偶見始悟諸苦道品久證豈待雪山苦行然後成功皆是開權起教為世人榜樣也蓋乘願力而來普度群生者歟問佛法戒于貢高我慢乃啓口容聲自稱天上天下惟吾獨尊自稱如來自稱十號何以故答如來之法或以表德或以揚教表德應須謙冲揚教不妨直任且戒于貢高我慢者學人之事非如來之事也學人有憍慢之根故當禁戒如來斷增上之念直道宣揚地位遼絶也問蠢動含靈皆有佛性輪回流轉中人為旁生旁生為人旁生既是人流轉云何旁生無知神識與人逈別答神識昏迷總緣業障凡夫比得道人則凡夫業重故昏旁生比人則旁生業更重故更昏及至解脫與人一般問十二因緣答無明等展轉感果分為三世因果無明與行二者是過去之因識與名色六入觸受五者是現在胎中五陰身果愛取有三者是現在之因生老死是未來之果由過去世無明與行為因感現在世識乃至受五者為果由現在果起愛取有三者為現在之因感未來世生老死三者之果展轉感果為因互相由藉為緣三世循環相續無間斷也無明者謂過去世煩惱之惑覆蓋本性無所明了緣此無明造作身口一切善惡行業是名為行由過去惑業相牽致令阿賴耶識投入母胎與父母神氣和合為胎藏種子是名識由此神識作種於是有心未成形質但有心之名目是為名由此漸成色身諸根未具具凝滑肉團是為色由此名色六根漸具則能入諸塵是為六入由六根成就十月滿足身根出胎雖未能便了知一切苦樂六根漸漸與六塵感觸是名為觸由六塵觸對六根便能領納前境好惡等事是名為受由頌受以後便于種種勝妙聲色欲等境生起貪愛是名為愛由此貪愛欲心轉盛於五塵境奔走馳求是名為取由此求取塵境起善惡業積集牽引生三有生死是名為有由現世善惡有業感後世還于六道四生中受生是名為生由此受生即有變壞是名為老死三世因緣流轉如此今稟佛教以觀智照之一滅俱滅頓出三界生死問何謂二空一人空凡夫妄計五蘊是我強立主宰引生煩惱造種種業佛為破此計故說五蘊無我二乘悟之入無我理是名人空二法空二乘但悟人空未達法空猶執五蘊之法實有佛為破此執故說般若深慧徹見五蘊自性皆空菩薩悟之入法空理是名法空問何謂法性法相龍樹菩薩作大莊嚴大智度等論明一切衆生皆有佛性一闡提等皆當作佛是為法性宗無著天親菩薩夜升覩史天宮於慈氏菩薩所受瑜伽師地等論專弘八識一切法相是為法相宗問何謂見惑思惑塵沙惑無明惑分別曰見謂意根對法塵非理分別起諸邪見計斷計常乃至有無諸見共有八十八使一身見二邊見三見取四戒取五邪見此五者名為利使六貪七瞋八癡九慢十疑此五者名為鈍使此十使歷三界四諦下增減不同成八十八總名見惑貪愛曰思謂五根對五塵貪愛染著迷而不覺貪瞋癡慢等略約三界有八十一品於諸境現在則戀過去則思名為思惑惑暗之境如塵若沙不勝煩細名塵沙惑無明惑者謂於一切法無所明了謂之無明見思塵沙二乘人與大乘菩薩同斷無明則惟菩薩能斷二乘尚不聞無明名字况復伏斷故永嘉大師云同除四住此處為齊若伏無明三藏則劣三藏即二乘人四住即見思惑四住者欲愛住地色愛住地無色愛住地見一切處住地言此惑住地而不去也問何謂現量比量量者量度之義現者顯現之義謂如五根之識對顯現五塵之境量度其法不相差謬是名現量比者比類之義謂借物比類而知如遠見烟知彼有火比弩知弓比獐知鹿之類是名比量問晦翁云心要思量分別此是心之本事一切事理必須思量分別然後得當子乃訶之何故答如來徵阿難心目所在阿難答以目在外而心在內及如來徵其心不在內又計之在外如是展轉窮逐徵詰至于無所著處使其妄心無所依止蓋由阿難不知妙淨明心遍一切處無在無不在而妄認塵緣分別影事以為心相如來欲破其妄想緣心顯其妙淨明體故七處徵之令其情竭意窮真心自現今晦翁所云正是塵緣分別妄心萬劫生死根本殊不知以妄心思量分別祗益迷倒悟得妙明真心則不思量而思量不分別而分別一真寂照萬法洞然宋儒所認多是三生石上精魂可惜也問何謂九識答一眼識眼根屬見能見者是眼識二耳識耳根屬聽能聽者是耳識三鼻識鼻根屬能者是鼻識四舌識舌根屬嘗味能嘗者是舌識五身識身根屬觸能覺觸者是身識六意識意根屬分別能分別者是意識七末那識梵語末那華言意此識本無定體即第八識之染分能以六根之塵送入內意又名傳送識八阿賴耶識梵語阿賴耶華言藏識此識能含藏染淨二種法若明鏡能含一切好醜像若藏染分大地火坑若藏淨分蓮臺華藏九菴摩羅識梵語菴摩羅華言白淨即如來清淨本然妙明心識也問梵天修梵行梵行者淨行也此行與如來白淨行業同何故只得生天答為不得般若智薰觀止修淨行止得生天居士見一比丘乞食貧家旁有大富室居士曰師何不乞富室而乞貧家答曰貧道不知其貧家居士曰此是無記性比丘曰貧道記得不擇貧富其心平等故非無記性問阿難被摩登伽女攝入室躬拊摩將毀戒體如何答是摩登心熾盛將欲毀阿難戒體非阿難將自毀其戒體阿難縱未徹悟業已是初果人親事如來戒德堅固何容易便毀止是摩登心將欲如此耳阿難被攝後種種迷情未必都是實境總來世尊要說出一部楞嚴作人天耳目借阿難權說後學便認阿難是恁地不濟人近癡人前不可說夢即如調逹謗佛入阿鼻地獄未必調逹實是闡提地獄實是苦報總來權設安知調逹不是大菩薩化身要顯如來不免有謗謗佛不免地獄也問何以知之觀人問調逹地獄中苦否對云三禪天樂不過如此若真受極苦報世間那有此硬牙根人要知佛之心境大都不可思議問一二十年深山習靜如何心地尚不得靜答靜中境像須從動處試得過才是猫狗坐臥籬落下何等安靜掉下一片骨頭即時忙亂從一切美境歷過方表不貪從一切惡境歷過方表不瞋於一切不貪不瞋處不生留礙方表不癡未了實相習靜深山無有是處問古德云若人識得心大地無寸土如何解答經云應觀法界性一切惟心造假如虛空是人心悔昧所成大地是人心執情所結一人悟得真心則虛空盡皆消隕無復頑虛大地悉化真如豈有寸土問一人發真歸元十方虛空盡皆消隕自有佛法以來豈無有一人發真歸元者虛空宛然不見消隕何也答一人發真歸元虛空自應消隕千萬人尚在迷昧虛空得不宛然今夫水一也天見是琉璃餓鬼見是膿血虛空一也悟人自是消隕迷人自是虛空問何以明其然答今夫虛空空也至人蹈之而升凡夫虛空彼不虛空也石壁至堅也至人穿之而過凡夫大地彼不大地也問中國使者至西域西域國王問中國土風使者盛言中國山川風俗衣冠文物之美西域國王曰願我命終往生中國西方之人既願往生中國中國之人乃又願往生西方何也答此全不知西方之說也西方淨土乃彌陀極樂之國勝妙莊嚴西域印度乃南贍部洲之西未免垢穢西域願生中國乃從凡而慕凡世人願生淨土乃從凡而慕聖不同如此東方距西域不過八萬四千東方距淨土十萬億遠六祖亦云八萬四千則亦誤以西方淨土為西域矣六祖云東方人造罪願往西方西方人造罪更將何往亦是指西域人言耳若蓮華九品之方彌陀說法之國豈復造罪何待他往當知六祖此言是戒世人勿輕造罪非掃西方公據也問如來正定故能生慧狐狸邪定亦能通神何也此見心靈妙故如來之定以正故能生慧狐狸之邪以定故亦能通神所謂制之一處無事不辨正定生慧慧以見性而超邪定通神神以濟惡而墮問菩薩布施捨頭目腦髓捨訖終以無恙故可布施今人若捨必致傷生此等大布施惟菩薩可行今人難學答今人所以不能學者以戀此形骸故若能決定捨此形骸便可作是布施即决捨形骸一念便是菩薩之心合菩薩之心便是壞而不壞若以不壞心捨施便非菩薩若真亡身為法壞亦何妨居士娑羅園東偏一至戚寓居焉夏月居士日手一編乘凉風梧樹下寓居老媼日怒罵家人時哭時詈晝夜不絶花開草榮風生月上與此媼了不相關居士以園為清都此媼以園為火宅因悟同一娑婆世界也心穢即是穢邦心淨即是淨土問此媼哭詈居士聞否答曰聞問厭惡否答曰不厭惡問既聞矣云何得不厭惡答聞者吾性不離境故不厭惡者亦吾性不隨境故聞而厭惡即非道人如其不聞乃同木石一搢紳笑居士長亝曰子聰明人作糊塗事居士笑曰豫事事糊塗只長亝一事聰明君以我聰明事為糊塗則將以我糊塗事為聰明耶搢紳曰舉世肉食子獨長亝寧是舉世皆糊塗子𤢜聰明乎居士曰不狂人以狂人為狂狂人亦以不狂人為狂仰世界人以覆世界人為倒覆世界人亦以仰世界人為倒夫見亦何常之有問旁生有前世六親當來諸佛果如是言則旁生斷不可殺食矣然何以明其然答善哉問也人生以百年為率一世百年則有一世六親十世千年則有十世六親百世萬年則有百世六親種種六親皆不能無業墮在旁生因緣會遇殺而食之彼此昏迷不能相照豈不哀哉昔戒闍黎見人騎一驢戲謂之曰兒騎阿爺騎驢者怒驢忽作人言罵其子而求度戒公戒公度之立生忉利又有一人痛鞭其馬馬忽作人言我是汝母何苦鞭我嗚呼凡夫騎父不知是父鞭母不知是母殺食衆生安知無六親在佛弟子問釋迦世尊往昔曾墮三塗否世尊曰吾未成佛以前地獄不知幾無論論為餓鬼餓鬼不知幾無論論為畜生雜色畜生不可算數論為狗雜色狗不可算數論為白色狗所積之骨高等須彌矣由此言之世尊當在旁生時殺而食之者又何可算數皆殺食當來佛子也此就其特甚二事論耳不必六親不必諸佛但與我為一體同類相賊相𢦤永斷慈悲永沉苦報能無凜凜也問先世帝王始為庖宰漁獵者首倡殺生肉食之事罪業如何答此須觀其意根衆生多劫以來殺業深重冤對酬償必不可免若菩薩應權本無利食衆生之心直為衆生了酬償之債始為此法何罪之有若以利食衆生血肉故而立法則衆生縱然應殺殺生之罪難逃問佛法視衆生悉如一子自不食其肉作如是想已然而見肉還復垂涎視美人悉如死尸自不貪其色作如是想已然而見色還復愛著何也答食衆生肉多生以來如是食根熟故今生作一子想此想未熟故貪美人色多生以來如是貪根熟故今生作死尸想此想未熟故生者令𤍨熟者漸生是故持戒當堅戒堅想熟問世人亦有生而不食肉不貪色者何故答此從多生或熏想或持戒來宿根既熟夫豈偶然問世人亦有彼好甚淡此嗜獨深者淡者省力深者難除何故答淡者由多生曾熏想持戒得力故湥者由多生不熏想持戒或熏戒而不得力故如來謂之習氣習淡者如瓜𤍨而自落習深者如藕斷而絲猶牽瓜熟蒂落如四門生老病死釋迦一見而了悟是也藕斷絲牽如聽樂聞箏阿難迦葉悟後而猶愛是也問如來萬劫不壞三界獨尊含靈蠢動誰不依歸凡聖賢愚誰不信奉惟闡提大惡敢於謗毀宋儒皆賢人君子也何故謗佛答彼局於教而限於識也夷齊賢矣不取湯武晏嬰智矣不知仲尼以仲尼而贊老子猶龍仲尼不局於教矣以太公而知夷齊義士太公不限於識矣問人心一耳何故分為九識答心一而已隨染淨二緣故分為九九識分別總屬一心譬之海分支流只是一海木分衆幹只是一木問智者智慧識者識神智是如來覺性識是凡夫迷情智是涅槃妙心識是生死根本八種識皆識也第九菴摩羅是白淨識白淨應云智何故亦云識答白淨是智以其從染分過來故亦云識問忍辱仙人被歌利王割裂身體何故得不痛苦答一從空觀成一從忍力就空觀成則四大等於枯柴忍力就則心王堅於金鐵枯柴一任焚燒金䥫何妨砍割問同一旁生也有死生朝暮有壽命千齡有沉滯污泥有飛騰霄漢有酷嗜臭穢有尋逐馨香有偏食葷腥有單需芻草種種不同何以故爾答衆生果報各隨業因如影附形如芽發種死生朝莫殺業重故壽命千齡造業而獨不殺或別作長壽因故沉滯污泥性昏沉故飛騰霄漢性飄揚而造業故酷嗜臭穢作穢業故尋逐馨香性好香而造業故偏食葷腥宿耽肉食故單需芻草宿戒葷腥而多作他業故又或宿世肉食過多罰令草食故是故主宰因果者不漏不錯亦是衆生業報自然無煩主者尚有多種不能悉述問五戒十善方得人道故應全享樂趣何多衆苦娑婆世界謂之五濁惡世既稱濁惡故應全受苦報何復多衆樂生人道中者為善惡均作故苦樂均受生天道者純善無惡故純樂無苦生三途者純惡無善故純苦無樂善惡苦樂均等惟人道為然問諸天諸仙至樂趣三途至苦趣俱不能修行成佛能修行成佛者惟人道耳此何以故答天仙方耽樂趣無假成佛三途方受苦報不許修行成佛機緣正在人道雖有業在不障熏修然亦有不可執一論者感生天仙宿帶佛根者雖在樂趣而正念宛然不忘修佛感生三途曾作佛事而以造罪受報者正受罪報而佛種發現立可脫離是故韋將軍雖生天中不受五欲纍世以童真而作佛事昭明太子妄分經典墮在泥犁後卒以信心而感蓮華問西方淨土有男無女無罪業故不退轉梵天亦有男無女無罪業何故不免墮落答淨土人入佛知見悟明妙心梵天人不聞般若單修淨行妙心本自無生所以不退淨行還同有漏報盡應來雖然如來說天人不能成佛為是禁戒人務求作佛勿希生天耳天人之中豈無宿有佛根具佛知見者彼憑淨業了悟非難即如十地中菩薩來權天主皆已入佛乘人也無泥佛語輕視天人以取罪戾問仙人性命雙修形神俱妙長生不死與天無極云何不及佛氏答性命雙修多雙修二字形神俱妙多俱妙二字長生不死多長生二字般若智中都無此住著所以超然出三界獨尊歷萬劫不壞問仙與佛畢竟何處不同答𠎣煉精化氣煉氣化神煉神還虛雖說還虛到底猶有形神在佛單了一性便自超然問仙人成佛不如入道然否答是不必然世人穢濁淨行難成仙道清虛佛智易朗仙人回心大覺如菜作虀謂仙人不得作佛闍黎罵羽士之言也不聞洞賔頓捨金丹紫陽化收舍利乎問中印度烈士行法持一夕不語夢人責以不語遂為所殺託生南印度大婆羅門家追惟禁戒終以默然忽生一子其妻曰汝今不語即殺此兒舉刀向之因急止之不覺語發甚矣愛河之難斷也然子被殺而不言殘忍太甚道人何必忍心然後證道答世間法鍾情子死不𮨇乃名殘忍出世間法情子死不𮨇乃斷愛河美惡諸境行法感現固是虛緣非關實境學道之人自應照破寂定得力所以貴照夢不能持持之未堅亦照未徹問王敏仲亡世不殺又好放生至敏仲有邪見師教之曰不殺不放付之無心為妙不必著相放生敏仲生疑以問法華禪師師厲擊叱曰公大錯豈可落空見耶面前木頭皆是無心著幾個木頭能救得世間一個苦衆生汝急懺悔邪見之罪師所訶空見如此至菩薩所證有人法二空龐居士云但願空諸所有亦是空見得無邪乎邪師所謂空乃無記性豁逹空菩薩居士所云空乃空𡚶心不空真理居士與無用禪師談禪禪師印可居士曰能說不能行總是虛見禪師曰行得到先須見得到見而不行是為有目無足見乃虛見行而不見是為有足無目行路恐著行解相應入道如箭問世間淨穢是心是境答境無淨穢淨穢惟心唐僧元曉夜宿塜閒渴甚引手掬於坐旁得水甘凉明日見之髑髏也欲嘔夫髑髏一耳心作甘凉想則甘凉心作髑髏想則欲嘔故云心淨則土淨心穢則土穢問世尊說法四十九年阿難承事日久當世尊住世阿難乃不得悟世尊滅度之後迦葉𢷤之乃始證道何也木匠能與人規矩不能與人巧然燈佛之於釋迦但授記成佛而已實無有法可得阿耨多羅三藐三菩提所謂信根成𤍨當自開悟故曰若要佛度我除非我度我問如來之身丈六猶云劣應大至遍滿沙界是事難信佛身即法性也法性無邊自應佛身無量修羅立於海中深不沒膝罪人在于地獄充滿鐵圍彼業報之身如此福報之身可知或謂居士曰吾頃夜哭亡者方哭而忽生怖心幾至狂惑何也答此死人哭死人鬼畏鬼也人有旦哭他人晚為人哭晚在人世旦入鬼録是我自哭我我自畏我誠知其然下手速修問速修便可免死乎答如來不免滅度何為免死死免三途柄在我問修行便得免三途乎答真心力修無有不免求决定免者當求生淨土問今人誰不知必死無一得免者乃往往在晷刻之中作千年之調何也答此由多生流轉以來結習根深情緣染重是故貴于時時提醒念念增明修行人所以作白骨觀此觀一𤍨貪生惡死念頭自輕問求生淨土有何妙法答都無妙法只在心專問心專如何便得往生答古人十年拜河河神出現十年拜枯樹枯樹生花皆成仙道專心求佛淨土豈有不生問如何心便得專答如人入牢獄者無一念一不思出獄墜深井者無一念一而出井求生淨土心得如此兩種人何患不往問彼坐牢獄墜深井者求出之心自然專切世間蕭散之人安得作如是想答嗚呼三界皆牢獄五濁盡坑塹步步近死何異法場深深墮落何異眢井一細思之安得不速求脫離問孔孟師世淑人正其衣冠端其軌範乃足為師表菩薩應化往往邋遢佯狂儀軌安在儒佛邪正應以此分答儒世間法自宜端軌佛出世間法不妨佯狂儒者之極大而化之之謂聖佛氏之極聖而不可知之之謂神佛之佯狂為瞞肉眼和光混迹密度有緣若使人人知為聖人則剎那住世不得寒拾一豐千饒舌立隱石壁逝矣問覺長老因偶動念史浩富貴數十年蒲團工夫一旦盡廢墮落為浩子彌遠一念小耳而富貴權謀遂至極熾何也答一線之泉能成巨浸一星之火能燒高山數十年蒲團如弓弩之持滿誤而一發遂不可當也問彌遠墮落三途必矣數十年蒲團工夫尚在否答三途苦報受盡善根尚在有時會發當其發時必有明師濟所以說破戒之僧猶勝外道問外道問世尊不問有言不問無言世尊默然良久外道讚歎曰世尊大慈大悲開我迷雲令我得入乃作禮而去阿難白佛外道得何道理稱讚而去世尊曰如世良馬見鞭影而行世尊當時並不曾開口外道從何得甚道理答故知授受有不在言語者當春光初到梅英已綻柳條忽青誰有語言報知梅柳問達磨西來不立文字教外別傳却與釋迦作經阿難結集大相矛盾能無得罪迦老答並不得罪世尊臨入涅槃文殊大士請佛再轉法輪世尊咄曰文殊吾四十九年住世未曾說一字世尊當時已有此公案是故當知初祖是迦老遣來底問何故佛祖既立文字又要掃他居士張目不答其人點頭去問迦文雪山六年蘆芽穿膝備歷苦行乃至成佛婆修盤頭一食不臥偏修梵行闍夜多尊者乃訶之曰此人與道遠矣設苦行歷于塵劫皆虛妄之本也由闍夜之言然則迦老非耶答道在見性性地若明則苦行皆成道之助設執苦行以求道則歷劫為虛妄之本問馬祖坐禪與逹磨面壁耳南嶽何故呵祖云若執坐相非逹其理答逹磨面壁體寂而智圓馬祖初時坐禪沉空而執相所以不同問初祖云外息諸緣內心無喘心如墻壁可以入道心要靈通乃成種智若如墻壁一物不通盡成阻礙何以入道答古德談道有自玲瓏能通萬法者言有自堅定不入一塵者言玲瓏能通萬法則云心如琉璃堅定不入一塵則云心如墻壁問六祖聞金剛經一句云無所住而生其心便豁然大悟此一句如何答此真空妙有法性初祖之於慧可心方紛動常恐未息諸緣才息諸緣便懼又成斷滅息諸緣是無所住不斷滅是生其心無住是真空生心是妙有六祖悟此更復何事問有僧問馬祖為甚麼說即心即佛祖曰為止小兒啼曰啼止時如何曰非心非佛即心即佛乃是至言妙理如何作黃葉權止兒啼實義安在答祖師為恐人心外求佛又恐人將心佛分作二樣故云即心即佛又恐人執著心佛二相故又云非心非佛若說到一相不住則即心即佛心佛二字亦是權說故般若如大火聚一物都住不得問學道得神通是得道之驗豈可揮斥答學道而得神通是得道之驗慕神通而學道是著魔之因神僧躡波自渡若履平地黃檗不能反欲斫僧脛罵他自了漢其僧歎曰真大乘法器我所不及故知學道不在神通仰山云此是聖末邊事如今且要識心達本但得其本不愁其末問人間四百年天宮為一晝夜其義何如答此各隨福業以分修短蜉蝣蟲朝生暮死世人之一晝夜是此蟲之百年一道人山中坐得神通知未來事向雲棲和尚印證被雲棲掃却問莫是此老自沒神通故掃道人遮護己短答從神通不如他也定勝他昔有梵僧從空而至來參仰山山曰近離甚處曰西天山曰幾時離彼曰今早山曰何太遲曰遊山玩水曰神通遊戲則不無闍黎佛法須還老僧始得梵僧曰特來東土禮文殊却遇小釋迦遂出梵書貝多葉與山作禮乘空而去一日又有僧來作禮師不𮨇其僧乃問師識字否山曰隨分僧乃右旋一匝曰是甚麼字師于地上畫十字酬之僧又左旋一匝曰是甚麼字師改十字作卍字僧畫此相以兩手拓如修羅掌日月勢曰是甚麼字師乃畫此相對之僧乃作婁至德勢師曰如是如是此是諸佛之所護念汝亦如是吾亦如是善自護持其僧禮謝騰空而去時有一道者問之師曰此是西天羅漢故來探吾道西天神僧兩度來作禮仰山故知雲棲定非凡情所測問文殊菩薩謂文喜和尚曰汝若無執心何用受戒學人固不必受戒耶答學人受戒者須遣執心執心若未忘必須受戒受戒為學人設大圓悟人何戒何不戒未圓悟而輒云不受戒是未卯而求時夜也問從古禪宗人或一棒或一喝或掌面或蹈胸或拖在地或扼在水或說一句沒巴鼻底話或單竪一拂伸一指便豁然大悟此領何意得何傳答此由學人機𤍨緣到一點即化所以領會正不在此等作勢伎倆此兩人別有機關密入處旁人怎參得透啞謎是他自猜不必強作理會理會得越有理越老越近越遠假如韶國師歷參五十四位善知識皆法緣未契最後至臨川謁法眼清涼師一見深器之一日法眼上堂僧問如何是曹溪一滴水眼曰是曹溪一滴水僧惘然而退國師於坐側豁然開悟平生疑滯渙若氷釋法眼曰汝向後當為國王所師致祖道光大吾不如也國師遍參五十四善知識不悟至法眼一見豁然此曹溪一滴水語不過述問僧前句有何大發明且此一句五十四師豈獨少此良以國師參訪既多心珠應朗機緣時節適在清涼耳正不在此一句也如一棒一喝而悟者亦何嘗假此一句問韶國師遍參歷訪機緣到時故應得悟六祖樵夫何曾參訪一聞而悟何也答此良由宿生根𤍨也何處有天生彌勒自然釋迦法眼問永明禪師曰律中道隔壁聞叉釧聲即名破戒現覩金銀合沓朱紫駢闐是破戒不是破戒永明曰好個人路不省其意居士試為解之答此是密印吾為顯說隔壁聞𨥁釧聲心入故破戒合沓駢闐心不入則不破戒問寶塔紹巖禪師問大衆曰諸仁者還明心也未莫不是語言談笑時凝然杜默時參尋知識時道伴商略時觀山玩水時耳目絶對時是汝心否如上所解盡為魔魅所攝豈曰明心更有離身中妄想外別認遍十方世界含日月包太虛謂是本來真心斯亦外道所計非明心也據此師所說何者為心答非魔魅所攝亦不離魔魅所攝非外道所計亦不離外道所計問瑞鹿遇安禪師嘗閲首楞嚴經到知見立知即無明本知見無見斯即涅槃師破句讀曰知見立知即無明本知見無見斯即涅槃於此有省有人語師曰破句了也師曰此是我悟處畢生不易破句讀聖經如何得悟得魚忘筌得兔忘蹄得佛理忘句讀要知此老悟處亦不在楞嚴問不在楞嚴從何得悟答多少依句讀楞嚴人不曾得悟問楞嚴經八還辨見明還日輪日還何處居士不答旁一人云何不對日還虛空居士笑曰人出烟鎖池塘柳試一神童神童無對旁一人對曰日烘苑囿桃居士笑曰還是無對者乃神童問古德云但盡凡情別無聖解如何答凡情盡時聖解即露原來聖解即是凡情離波求水水復安在東林萬菴禪師曰欲識諸佛心但向衆生心行中識取欲識常住不凋性但向萬物遷變處會取問逹磨面壁忒煞凄凉華嚴道場極大富貴此如何會答有則萬法俱來無時一絲不掛問那吒太子析肉還母析骨還父然後現本身運大神力為父母說法骨肉既還父母用甚麼為身答海漚去後自有全潮問心苦雜亂奈何答古德云清珠投于濁水濁水不得不清念佛投于亂心亂心不得不佛問如何得臨終一心不亂答古德云古之人念念在定慧臨終安得散亂今之人念念在散亂臨終安得定慧問佛法久參不透奈何答黃龍禪師謂泐潭草堂清禪師云子見猫兒捕鼠乎目睛不瞬四足踞地諸根順向首尾一直擬無不中子誠能如是心無異緣六根自靜默然而究萬無失一也草堂于是盡屏間緣嵗餘豁然契悟久參不透幸有前人樣子可學問將蚯蚓斬斷兩頭俱動未審佛性在那一頭那一頭不是佛性問倩女離魂那一處是真身答那一處不是真身問性空妙普菴主曰六十餘年和光混俗四十二臘自在逍遙逢人則喜見佛不拜既見佛為甚麼不拜答雲門還要一棒打殺釋迦丹霞還燒木佛世間自有此一等莾男子且放他亂做姑蘇劉鳳著玄覽篇談天文曰夫天元氣也浩然而已無他物焉釋氏所謂三十三天者妄哉鳳稱博學其識如此如鳳說列聖明王制為郊天之禮皆虛文也鳳敢蔑上帝為無有又何為而從方士學仙對餘津津談冲舉事也後又引天有六天天神之大者曰昊天上帝其佐曰五帝又何云無他物焉鳳蓋信手抄舊文都無斟酌者耶問文殊參維摩如何答藝壓當行問永嘉參六祖如何答碁逢敵手問如何是明心答風折蛟水千片斷氣衝魚鑰九關開問如何是見性答湘潭雲盡暮山出巴蜀雪消春水來問緣起時如何答縱然一夜風吹去只在蘆花淺水邊問古來大英雄乘時致身掌握天下撑拄乾坤流慶子孫垂芳竹帛良亦快意何必瑣尾拘剪作苦行頭陀答齊桓公生能九合諸侯死不能照管七尺蜀孔明之智能籠絡群雄其見不能預卜生死蟲流於戶不勝郎當星隕於營寧延晷每想王侯將相白楊黃土珠襦玉柙時總一場扯淡何如三家村裹黃面道人預告化期端坐委蛻顏色如生異香滿室問解與悟如何分別答解從文字聞見中得悟從性地開朗中生解自外而入悟自內而出解如爝火之光悟如日月之光問師子尊者負罽賓之債悟逹國師缺朝錯之冤均之定業也迦諾迦能以功德水洗滌宿冤師子不能以菩提力自免業報何也答菩薩作用機感不同有時以因果為戒則不難出其身以為受報之榜樣有時以普度為願則不難救一人以起懺罪之因緣所謂不能消定業戒人之犯罪也如諾迦之救悟逹則定亦不定也萬古懺罪緣起在此一公案故定業不定權教也不然金鎗馬麥如來不能自免諾迦安能免悟逹也問佛家有禪宗有教宗有律宗如何分別答習定久參豁然了悟法法皆通謂之禪宗制為經律論三藏法師曉暢法門登壇講說令衆開解謂之教宗設為禁戒儀軌令學人持守不敢毀犯謂之律宗教是入佛之門戶禪是入佛之閫奧教是生解禪是生悟必先解而後得悟禪不取教是自杜其入門教不知禪終不入其室奧乃至律者則慎攝威儀培養定慧禪與教之所兼資也自釋迦拈花逹磨面壁以至南嶽百丈黃蘗青原雲門臨濟溈仰曹洞皆禪門人也自阿難總持迦葉結集馬鳴龍樹無著天親諸師著論天台衍教章安結集法智慈雲嗣法皆教門人也自如來制為沙弥比丘菩薩諸戒舍那面授妙海親聞梵網譯于什師受戒遍于義學以至晉之慧遠唐之宣律師皆律門人也要之三事互用兼資原無分別問夜叉羅剎修羅毒龍之輩或抗衡天帝四王諸將不能輒際或食噉衆生嶽瀆神靈不能擒制遇戒德沙門則擎拳拱手何也答此見惡趣衆生皆有佛性也若無佛性則既抗衡天帝蔑視神靈而又何有干一孤僧也問純陽飛劍斬黃龍劍不能入遂擲劍歸依當時純陽便有殺黃龍心否答不然純陽當時不過試黃龍道力何如耳豈便操此惡念問唐時六宮內使吳元卿御園花發賞既移時忽聞空中神語云此開謝無常之物甚能損人道心仁者何為好之元鄉遂感悟祝髮出家證阿羅漢果古之比丘乃有見桃花悟道者花一耳或以之損道心或以之悟道何也答者以無常悟者亦悟其無常居士一日覽釋迦記喟然發歎人問何歎也答曰釋迦一見生老病死即捨諸緣而入道吾見生老病死五十九年尚有所不能捨人之智愚賢不肖相遠一至此哉問學道有魔如何答邪心動處即是群魔汝本自魔誰能魔汝魔即非魔魔即法界回頭四果却是摩登問煩惱即菩提煩惱不斷焉得證菩提答斷煩惱得菩提是二乘人不斷煩惱得菩提是為大乘斷煩惱取菩提是離波求水不斷煩惱取菩提是即波即水離波安得有水離煩惱安得有菩提問佛法無人我無冤親謂之平等佛以此教人必能身體力行有可拈出作榜樣否答憍陳如世世與世尊為讐世尊成道首度此人此是冤親平等釋迦住娑婆世界作本師教主却讚阿弥陀佛勸人往生淨土文殊為七佛之師却讚觀世音所證聞熏聞修金剛三昧耳根圓通最為第一此是人我平等居士祭黃白仲文云我若藉兄寵靈得證道果當首度上海君呂玉繩信不及笑曰君此言過矣居士曰不過釋迦首度憍陳如居士家飯熟人至便餐或訝之居士曰物各有主此細人之言天生五穀撞著便餐何分爾我人只為太生分別所以長夜漫漫流浪生死問菩薩度脫衆生往往一言點化借令我輩將此一言去點化衆生衆生未必度脫何也答言語點化全伏菩薩道力𡨋加此一言出菩薩口便是醍醐出凡人口便是常味古有竪拂子而悟吹布毛而醒者正不在言句也西天大耳三藏法師自云得他心通唐肅宗命忠國師試驗忠問汝得他心通耶藏曰不敢忠云汝道老僧心即今在甚處藏曰和尚是一國之師何得去西川看競渡船忠良久再問汝道老僧即今在甚處藏曰和尚是一國之師何得向天津橋上看弄猢猻忠第三問藏良久罔知去處忠叱云這野孤精他心通在甚麼處三藏無對古德又有被土神先報為鬼神所窺天人送供為藏心不密者何也答學道之人最怕念起念頭才起鬼神即知忠國師兩度被王藏覷破者以念起也最後茫然者以無念也瞥興一念則鬼神已報他人念泯全無則天人莫覔其處問佛家千經萬論諸師語録如麻畢竟有修行最喫緊可拈出者否答聖賢言語句句慈航豈容分別料揀吾嘗取高峰示衆一段話似為學人喫緊曰尋常教人做工夫看個萬法歸一一歸何處公案看時須是發大疑情世間一切萬法總歸一法畢竟歸在何處向行住坐臥處著衣吃飯處屙屎放尿處抖擻精神急下手腳但恁麼疑畢竟一歸何處决定要討個分曉不可揚在無事甲裏不可胡思亂想須要綿綿密密打成一片直教如大病一般吃飯不知飯味吃茶不知茶味如癡如呆東西不辦南北不分工夫做到這裡管取心華發明悟徹本來面目生死路頭不言可知世間情念放教輕微道念自然濃厚此等言語最有柄用此工夫如甕中捉鱉萬無一失是此老自家做箇底工夫拈出示人吾嘗與德園居士歎息高峰中峰死工夫不曾做得何由徹悟諺云欲求生富貴須下死工夫居士聞逹觀和尚好打人心頗不以為然笑謂人曰他若打我一下我便還他兩拳李居士次公出其門下亦曾遭此老拳頭我嘗笑之李曰人求他打不得某又不以為然一日覽高峰語録師云某十五歲出家十六為僧十八習天台教三十入淨慈寺立三年死限學禪遂請益斷橋和尚令參生從何來死從何去於是意分兩路心不歸一又不曾得斷橋和尚說做工夫處分曉看看擔閣一年有餘每日只如個迷路人相似那時因被三年限逼正在煩惱中忽見台州淨兄說雪巗和尚常問你做工夫何不去一轉於是欣然懷香詣北澗塔頭請益方問訊插香被一頓痛打即關却門一路垂路回至僧堂次早粥罷復上參始得親近即問已前做處某一一供吐當下便蒙𠞰除日前所積之病却令看個無字從頭開發做工夫一遍如暗得燈如懸得救自此方解用工𠁅已後做得稍有緒竟不問做處一入門便問阿誰與你拖這死尸來聲未絶便以痛拳打出每日只恁麼問恁麼打此後千辛萬苦經及五年一日夜臥正疑此事忽同宿道㕛推枕子墮地作聲驀然打破疑團如在羅網中跳出追憶日前所疑佛祖誵訛公案古今別因緣恰如泗州見大聖遠客還故鄉自此安邦定國天下太平一念無為十方坐斷古人苦心苦行乃得證悟明師拳棒不錯用浪施始知次公所云求打不得良非虛語居士不識逹觀機關𡚶有譏評作過儼然今當懺悔問觀世音世音當聽云何曰觀解師謂不以目觀之以觀智照之然否觀智解固是不曰六根互用乎聖人妙得互用之理以耳觀以目聽良無不可然亦有不假耳而聽不假目而觀者阿那律陀因被佛呵七日不睡失去雙目一悟大道大千世界如觀掌果亦何待目而觀乎問古人入道以信為入門經云信為道源功德母長養一切諸善法却參取又要疑情疑則妨信信則不疑何也高峰云萬法歸一一歸何𠁅决定便恁麼信去便恁麼疑去須知疑以信為體悟以疑為用信有十分疑有十分疑得十分悟得十分譬之水漲船高泥多佛大愚謂惟信故疑疑故所以决其信不疑則不參不參則不透撤去塵埃明鏡目朗撥開雲霧皓月孤懸疑者所以撤之撥之也高峰又有最喫緊語一段為之拈出曰著實參禪决須具足三要第一要有大信根明知此事如靠一座須彌山第二要有大憤志如遇殺父冤讎直欲便與一刀兩段第三要有大疑情如暗地做了一件極事正在欲露未露之時十二時中果能具此三要管取尅日成功不怕甕中走鱉問唐白樂天宋蘇子瞻賔客聲妓無𠜇不在耳目山川風月無𠁅不遍吟篇麗情綺語乖冲素之風逸興狂懷鮮寂寥之趣人乃往往以禪理歸之何也答二公寄跡聲妓怡情詩酒其中自有一段蕭灑超脫之致所以近禪以寄迹故不妨學佛以缺專一工夫故不能致精為高人有餘為菩薩不足問人一生在富貴歌舞歡樂場中臨了畢竟證道有之乎答此須晚年瞥爾回頭一刀兩段始得若終不回頭竟從歡樂場中證道者此釋迦之所不能也人為居士贊西湖之美居士笑曰斷送多少人破鈔斷送多少人損德斷送多少人不成佛故知沼吳不獨西子安得一范少伯載之而去居士與雪浪和尚觀梨園雪浪曰學佛得如戲場了手矣彼作帝王知是假帝王不喜作乞兒知是假乞兒不愁分別是假悲相逢是假歡錦繡在體不生愛戀刀鋸在首不作恐怖一切皆假一切皆作應世如此便是大菩薩手段居士觀歌舞人問作障否答不作障檀板一停舞衣一卸此景象便去我胸懷未嘗熏入心想我此胸中被如來坐定神頭鬼臉一切入來不得若入來得早則遠避不看也故曰閉目不觀便是一重公案人問雲棲于居士答雲棲內如琉璃瑩徹外如美玉無瑕吾在堂下不能定其品位問德園居士答學貫天人照鄰殆庶從古不見有此人問隱鱗遠有王龍舒近有𮨇寶幢問僧孺總之不凡人問王性海是深山苦行頭陀問燈公窮老答幽溪如雲光湖南如支遁又問某公答仲尼訶子貢方人請關吾口問顢頇佛性儱侗真如又云豁逹空皆禪家所訶乃至道悟禪師則曰任性逍遙隨緣放曠豈非儱侗豁逹乎答所謂儱侗豁逹是無記而踈狂所謂放曠逍遙是解悟而自在毫𨤲之千里之隔問居士作佛法金湯為普度人居士已自度否答未也問古德云未能自度不許度人淨名云若自有縛能解他縛無有是處答不自度不許度人不自解不解人縛是如來說不聞四弘誓願其一云衆生無邊誓願度法藏比丘方在因地便發四十八願度盡衆生一衆生度不盡自不取正覺大乘普度皆于未能自度之先發弘誓願有此妙因乃後可望妙果况末法自度人少苟有見解不妨闡明為世人眼目如涉巨川苦無橋梁竹筏承乏聊以濟衆唐圭峰密禪師亦云不知宿生何作熏得此心自未解脫欲解他縛古來已有此公據若泥於未能自度不許度人則學佛未成之人皆不許發弘誓願而如來又何以呵斥辟支自了漢也如來之意謂未能自度欲求度人人不信從度脫者少教人急先自度然後度人非謂初學之人不許發普度弘願也
