body:
  text: 四明鴻苞居士屠隆著佛之為道善超諸有普濟群靈越三界而獨尊歷萬劫而不壞非佛之自為尊大也理如是也其理無而不無有而不有空而不空色而不色生而不生滅而不滅動而不動靜而不靜為而不為不為而為性而含相相而含性體而合用用而合體寂而常照照而常寂絶本迹泯能所融染淨忘去來其道之廣大精微譬如日月之照萬物大海之納衆流慈父之育諸子明眼之導群矇凡在有生咸蒙依怙悲仰而不遑讚歎而無盡者也乃有闡提迷障敢行謗毀世儒拘攣顯肆排擊良可哀愍矣余謂世儒之排佛與闡提之謗佛雖均之造罪其心則異闡提廣作諸惡懼佛法之報應而撥無因果世儒擁護儒教慮佛法之蠧害而自樹藩籬闡提之心私而邪自投無間之種世儒之心公而暗罔知正覺之宗闡提如篡賊謀逆凌蔑天王世儒如夜郎自雄不知漢大此兩種人心有公私罪有大小皆作過也闡提不論已余請為世儒言之儒世間法佛出世間法也娑婆世界自五帝三王周公孔子以來並以儒教治世仁義禮智紀綱法度拯頓扶森羅布密古今民物相生相養其間雖有理亂興衰而聖賢迭出豪傑繼起補衰為盛易亂為理世界至今安然無恙是未有佛法之前天下生靈未嘗不治安也而佛氏者一且從西域入中國傲然若據世界之尊立吾儒之上天下亦遂靡然從之使吾儒之道鬱而不暢晦而不明如蟲之蠧木莠之害禾儒者烏得不辭而闢之也夫西戎方也豈容中國而稟其教中國自開闢以來是吾儒所治也豈容漢明之世而佛是宗吾儒者以人倫道德為教也豈容佛蔑棄彛倫而抗吾儒以立訓未有佛法之前吾中國未嘗不治安也豈待佛䦨入中國而惑世道以依歸是儒者之所必斥也余謂皆不然凡夫識見淺狹身處中華便謂西域戎方無當華夏不知宇宙亦大矣就中國而論則震旦名為中華四方裔夷皆屬偏鄙就大部洲而論則西域正當中印震旦一國不過東偏佛生中印度是當天地風氣之中也以東偏之一隅而笑中印為西鄙亦不通方之見也佛道三界稱尊萬劫不壞者也世界之成住壞空皆佛理為之運斡山河大地悉佛理為之生成聖君賢相多菩薩為之應權禮樂仁義亦真如為之妙用特佛之一字不大顯明以故凡夫不盡知依歸世人不能深造耳時節因緣至漢明之世金人感夢傅毅闡揚使者西求佛教東入然實不自漢明始也周穆王時有化人入中土穆王於終南山造中天臺於蒼頡臺造三會道場以奉化人秦穆公時扶風獲一石佛穆公不識棄馬坊中污穢此像令公染疾公又夢遊上帝極蒙責數覺問群臣由余引周穆王故事知為佛神召工成一銅像相好圓滿又築樓閣以供香火而孔子亦言西方有聖人焉則知佛法之入中國不自漢明而始自漢明而大顯耳漢明以前佛法密持世教以故不得弘通漢明以後佛法顯被群機以故多所證入是所謂几時節因緣也佛之棄家學道儒者謂之無父無君蔑棄倫紀不知問安侍膳為人子孝之小者也修職納誨為人臣忠之小者也辭別父母而學道道成而超度二親獲升善地其為孝也莫大焉不事君王而學道道成而祝釐人主永享壽康其為忠也莫大焉不學佛則為凡夫而君親為凡夫之君親學佛而成則為聖人而君父為聖人之君父凡夫則與君親同沉苦趣聖人則與君父共享樂邦即如釋迦之教首度淨飯以及摩耶次度耶輸次度羅睺次度阿難是君臣父子夫婦兄弟之倫並未嘗廢也而謂之無父無君蔑棄倫紀可乎其所廢者特臣子問安侍膳修職納誨之小節耳且其所謂辭別父母不事君王者特自其比丘之法則然在宰官居士白衣皆不離君親而皆許學佛成道又可以廢人倫詆之乎佛法未入中國之先中國未嘗不治安是矣然其時以廣殺物命奉養口腹為當然不知持齊戒殺何物也祭祀則三日齊三日而外不復齊矣七日戒七日而外不復戒矣不知比丘沙彌菩薩終身大戒何物也貴人賤畜斬艾群靈如同瓜菜不知肖翹蠉蜎皆我同類皆有佛性也羅縠錦繡以為華飾不知殺蠶蟲之萬命炫皮囊之五彩大罪也百味珍羞以為甘旨不知烹水陸之群靈塞飢瘡之一孔極惡也鷹犬矰弋遍滿山林網罟簄梁充塞江海牛羊雞猪狼籍都市魚鱉蝦蟹腥穢街衢習而行之恬不為畏不知冤結債負報應無窮也清歌妙舞品竹彈絲女寵男歡快心娛意聖賢豪傑視為分內不知欲海無涯淪墮之本也遭世逢時爭名競利里巷光榮道路欣羡中人以上率不免染指不知幻泡無常流轉之根也繫縛情緣貪戀骨肉苦樂縈心生死結念不知有解脫也𡚶分人我力修恩怨胡越同席羌夷接軫不知有平等也上焉者知慎屋漏畏通都下焉者不䫃人非及鬼責並止論目前何有身後不知善惡因果業報歷千生萬劫而不盡也自佛法昭明始悉種種違犯如故者雖多奉教修持者亦不少其為世道之津梁詎不大哉儒為世間法用以綱維名教而保聚于生前佛為出世法用以練養性靈而升濟於身後此二者原無相害何妨兩存佛不排儒儒何必斥佛故豫謂宋儒程朱之排佛者若以佛果有害於儒而排之則為識不明若知佛之無害於儒而不得不排之則為量不廣宋儒排佛之語具在豫不揣一一取而置辨焉非敢求勝先儒惟以稍明佛理也不得已也何以故蓋豫既真知佛理之廣大精微為世道群靈之所依怙而宋大儒若程朱者又人倫中山斗為天下後世之所宗師宋儒排佛迄無敢為之解者則世人翕然尊信其言而佛道終以晦蝕是可痛也余是以不辭虀粉奮臂而起為置一辭寧得罪於程朱不敢得罪於佛法宋儒之闢佛蓋大抵起于不深究其理而輕於持論也醫者用藥而不中人之病病者笑之况佛本無病而宋儒以大藥治之佛之所為笑而不辨也按宋儒欲排佛法乃謂人死即滅無輪回再生之理此本于晉阮生無鬼梁范縝神滅論前人辨之詳矣夫天者氣也所以宰是氣者有神靈焉所謂天神也地者形也所以宰是形者有神靈焉所謂地祗也人得天地之形氣而生所以宰是形氣者心之神靈也天地閒凡氣有盡凡形有滅惟神靈不屬形氣故無變滅氣盡而神靈不與之俱盡形滅而神靈不與之俱滅故能立形氣之先起建造化存滅盡之後重立乾坤使形氣既亡神靈亦滅則誰為中間主宰斡旋而世界劫運一混沌而不復開闢矣故天神地祇與人心之神靈皆不變滅者也謂之神靈一耳而乃有佛菩薩緣覺聲聞天人阿修羅地獄餓鬼畜生如佛家所謂十法界之分別者何也蓋神靈之本體原是一味清淨自然而世間之情塵不能不與神靈和合以故神靈有染淨有染淨故有升沉淨之極者則為佛次為菩薩次為緣覺聲聞染淨均等者則為天人染之極者則為地獄次為餓鬼次為畜生次為修羅經云應觀法界性一切惟心造是也如云神靈必滅人死無知人心之神靈死而必滅則天地之神靈豈得獨存惟一形氣泯然無知則天地人僅同草木瓦礫也若云天地有神人死無鬼此又不通之論也天地之形氣有盡神靈長存人之形氣會終神靈不死亦猶雲霞變遷虛空不爛也人心之神靈與十法界同一神靈耳故可以佛可以菩薩可以緣覺聲聞可以天人修羅可以地獄餓鬼畜生惟視人之染淨何如矣安得謂人死無鬼遂無佛并無天神地祗同于草木瓦礫乎余嘗與一朝士論彼云無佛無神無鬼無因果無輪回余難之曰子謂都無矣亦無上帝否彼不敢也而曰上帝安得無余乃大笑曰子必云無上帝而後可矣九重之上有大明天子則有百官萬民而後成世道九霄之上有玉皇上帝則有群真萬靈而後成天道如皆無之上清一孤帝也乎哉其人語塞人死之有知也死而有鬼也因果輪回也如日之必有月也晝之必有夜也暑之必有寒也陽之必有陰也周孔皆不言無宋儒欲斥佛而遂欲并神鬼而無之惑亦甚矣是故人修其心為佛心則為佛修其心為菩薩心則為菩薩修其心為天心則為天修其心為人心則為人不能修而心為修羅心則為修羅心為三途心則為三途善惡升沉皆有因果撥而無之大罪也宋儒謂佛有觀心之說夫心者人之所主乎身一而不二者也故以心觀物則物之理得今復百物以反觀千心則是心之外復有一心而能𮅬乎此心也又曰佛氏之學以心求心以心使心如口齕口如目視目此言非也蓋心也者湛寂靈明圓融無礙包羅萬法含褁十方至靈至妙之物也心一而已非有二也以其圓融無礙故外觀百物只此一心內觀一心亦只此一心外觀百物謂之放光內觀一心謂之返照能放光又能返照此心之所以為靈妙也月能照萬川不能返照以月不同口與目能一而不能二以一為一者形也心能一而能萬以萬為一者神也故口不能齕口目不能視目而心能觀心也夫心欲其淨去染而得淨誰能為之心也謂之以心觀心則可謂之以心求心亦可謂心有二則不可若以心觀心為二心則以心觀百物百心也宋儒謂釋氏之學於敬以直內則有之矣義以方外則未之有也故滯固者入於枯槁疏通者歸於恣肆其直內者要之亦不是是未為知佛也謂佛敬以直內是矣蓋佛之內心止以絶紛飛謂之寂寂觀以除昏暗謂之惺惺止而常觀止非無記觀而常止觀非亂想定如大地八風吹而不動慧如朗月萬物照而無遺以慧為定定之體湛然以定為慧慧之用寂若止觀為因定慧為果功先戒律嚴淨毗尼敬以直內可謂真合儒教矣然必身心俱虔行解相應內修觀智外肅威儀布薩羯磨遵如來之遺則六度萬行為佛事之莊嚴語不殺則傷蠉飛蠕動即殺也語不盜則鼻嗅荷香即盜也語不則隔壁聞叉釧聲即也語不貪則一草一針弗敢貪也語不瞋則肢解割裂弗敢瞋也語不癡則等覺如來一品無明未破亦癡也如來所呵大法所禁即一衣一履一瓢一鉢一牀一榻一水一飯一諷一誦一跪一拜一涕一唾一便一溺弗敢苟也如來有一定之業則世尊已登極果不辭九惱佛氏有示滅之期則說法四十九年不敢不滅從阿難請而度女人則像法遂減五百為女人而說法則聲容戒於露齒毗盧談小乘之教則敝垢於衣裳古佛權菩薩之位則北面于迦老慶喜未證道果則鉗錘於飲光賔頭輕露神通則擯斥於滅度義以方外可謂嚴矣密矣滯固而入於枯槁者乃小乘𤢜覺非大乘圓頓之門疏通而歸于恣肆者乃放逸狂禪違梵網木叉之律罪在學人於吾佛何損乎佛之方嚴如此此皆傳之金口載之貝經至章明較著也宋儒都未究心其輕於持論宜矣宋儒曰今說求放心即似釋氏說入定一般但彼到此便死了吾輩却要此心主宰得定賴此做事業所以不同夫以儒之求放心比佛之入定似也放心者心馳於萬里不勝其翕熠紛飛求而收之尚未必有柄定心者心攝於一處已自得凝寂安恬徐而俟之自然能發慧光謂定心為死非知定者也佛氏言止則必兼觀言寂則必兼照有空如來藏一法不立有不空如來藏萬法森然是故身趺於深山磐石之中心隱於鬼神莫測之地泰山崩而不驚雷霆擊而無恐虎狼蛇龍視如無有天魔山鬼了不見聞形如槁木迹若死灰矣而此中之靈熒洞逹爍群昏而不迷赴感隨緣遍十方而無礙如一輪之月悉照萬波萬波各有一月月惟一輪一味之雨咸蘇萬品萬品各有一雨雨止一味用起於天堂則欲色無色盡化香臺用起于地獄則銅柱鐵床遍成華藏人王宰臣菩薩應現螺螄蛤蜊大士化身種種作用種種事業胥靜定中來也謂之心死可乎豈特大乘聖人宏通普度即如二乘四果彼悟遍真之理斷三界生死亦不至如宋儒所彈斥蓋其所悟遍真之理即活機也必如頑空而化木石修定而入無想以是詆之當矣宋儒曰釋氏之說若欲窮其源而去取之則其說未能窮而已化為佛矣只且於迹上考之嗚呼是何言也原夫佛理之高者如陟須彌深者如探滄海其廣大橫亘沙界其精微妙入毫芒十地菩薩之品位以九地欲窺之茫然妙覺如來之心胸以等覺欲測之匹得世尊說大乘之法則二乘在座如啞若聾維摩入不二之門則問法諸賢逡巡退却其閫奧若斯之難造而淵源若斯之難窮也儒者欲排之則應號於人曰吾於佛氏已盡𢲘其深微盡得其底裏其理果淺其說果邪妙處不能有加於吾儒而謬處則大乖於名教以此持論乃可以服佛氏之心信天下後世之學者也奈何畏其源之難窮窮之未能而身先化為佛姑從皮膚形迹草草而排之乎則是畏須彌之高恐其顛越姑從山足而談須彌亦不甚崔嵬畏滄海之深懼其沉溺姑從涯岸而語滄海亦不甚浩渺不將為山靈海若笑乎且有所彈斥必云其理無甚高深源易窮也吾灼見其非是雖終身入之不足化我也今一則曰其源難窮二則曰窮之未能而恐身已先化則是明知其妙也明知其易於化人也何為而復行彈射豈所謂示天下以太公無我之心哉若欲云其源不正而易化人亦必入而窮之然後可以定其邪正立其斷案而有辭於天下後世不窮其源安知其邪正不得其罪安定其斷案不惟佛氏不服旁人亦不服也𨐫如誣平民為盜者必云吾已入其奧室得其真贓乃可定罪𮨇曰吾畏盜之疆也入而窮之恐未必得贓身陷大戮吾姑從聲音笑貌間得盜也而旁人盡知盜之為平民也能不囅然以笑拂然以憤哉其所指為迹者在逃其父母一節也佛氏欲超生死不得不先斷情緣既證真常自然濟度父母一人成道九族生天生逢吉祥死蒙濟其視凡人父子依戀膝下而服勞奉養以為虔繫縛情緣而淪胥共溺於苦海其為孝孰大而孰小余固嘗辨此詳矣此未足以定佛氏罪也服佛氏心也宋儒曰某年十五六時嘗留心於此後見李先生先生只教看聖賢言語某遂將禪來倚閣意中謂禪亦有在且將聖人書讀來讀去一日覺聖賢言語漸漸有味回頭看釋氏之說漸漸破綻宋儒意蓋又謂吾非不留心非不知其旨趣久之而覺儒道有味佛理破綻故舍彼而取此也此語却可聽不知佛理之破綻作何覷破儒書之有味作何咀嚼吾不得而窺此老之際也宋儒為儒看儒者言語㴠泳嚅嚌久而有味固其宜也乃因而得佛氏之破綻吾不能知矣宋儒當時胡不一一悉數其破綻處也吾且𡚶談一二中庸天命之謂性命指命蒂性指神靈此後世性命雙修之根本也儒者乃解之曰天以陰陽五行化生萬物氣以成形而理亦賦焉猶命令也則是以命為虛字也性命兩物將何所據此儒者破綻一也佛無是也喜怒哀樂之未發謂之中中固從喜怒哀樂未發前得名也儒者乃解之曰中者不偏不倚無過不及甚是錯解此乃已發中節之和也喜怒哀樂未發之時杳然而無端倪漠然而絶形相豈有偏倚過與不及之可言乎惟至發而中節乃可云不偏不倚無過不及謂之中節也此儒者破綻二也佛無是也眼舌為根食色為塵根塵和合乃成緣染是以西方聖人空之曰無眼耳鼻舌身意無色聲香味觸法而大儒乃曰食色性也則是以塵為性也此儒者破綻三也佛無是也昭昭上帝主持世界百神布列萬鬼森羅故曰小心翼翼以事上帝又曰上帝臨汝無二爾心又曰神之格思又曰神之聽之又曰精氣為物游魂為變而儒者乃云鬼神者二氣之良能則是以事上帝事氣也上帝臨汝氣臨也郊社宗廟之祭祭氣也天亦蒼然而已地亦塊然而已天地間自人物紛擾外其餘悉冥冥漠漠而已有是理乎此儒者破綻四也佛無是也余不敢盡言矣而覔佛之破綻又將安在要之仁者見之謂之仁智者見之謂之智各起於衆人之情見邪正得失固無定論也堯之見許由聖人也逆旅主人之見許由竊屨盜也七十子之見仲尼聖人也西鄰父之見仲尼東家丘也許旌陽之見蛟蛟也九江太守之見蛟美書生也仙佛之見魔魔也迷人之見魔仙佛也天之見水琉璃也餓鬼之見水膿血也白日而見枯木木也夜見枯木鬼也佛以儒為破綻儒亦以佛為破綻不狂人以狂為狂狂人亦以不狂者為狂是非烏乎定哉宋儒曰上蔡云佛所謂性正聖人所謂心佛所謂心正聖人所謂意心只是諛得這理佛氏元不曾認得這理一節便認知覺運動做性如視聽言貌思聖人則各有其理佛氏只認得能視能聽能思能動底便是性不管橫來竪來他都認做性最怕人說這理字都要除掉了冤哉晦翁之詆佛也佛氏之言心性元只是一物天地世界人物器具公共底一件清淨廣大妙湛圓明物事名之為性性之靈通處名之為心性如鏡之明心如鏡之照其實一物也無所不含裹總謂之性性而靈通乃謂之心如山河大地草木瓦礫皆有性在人物之性能靈通知覺乃可言心山河大地草木瓦礫止名為性不名為心佛之所謂心乃清淨廣大妙湛圓明謂之本覺謂之般若謂之毗盧性海謂之摩尼寶珠所謂意者乃人心之識神生死之根本佛之所以圓修妙悟必轉此識神而為智慧乃稱為轉凡成聖也蓋凡夫之與聖人本同具此心性凡夫迷真逐𡚶故智慧化而為識神聖人破妄歸真故識神轉而為智慧意者佛之所呵也乃云佛所謂心正聖人所謂意亦大謬矣佛氏歸真則知覺運動視聽言動能視能聽能言能動無非是性凡夫逐妄則知覺運動視聽言動能視能聽能言能動無非是妄謂佛氏只認得能視聽能言動底是性豈不冤哉夫能視能聽能言能動謂之非性不可而謂佛氏所稱清淨廣大妙湛圓明之性只在視聽言動得名有是理乎宋儒誣佛佛初無是說也說性則如來會一性於統宗說理則如來詮萬理于事物理之廣博橫被法界理之精微析入毫芒二乘之破見思窮理尚粗菩薩之破無明窮理斯精等覺之一品無明未破則理尚有礙必入妙覺而後一真了徹萬理洞然矣謂佛不認得理字又豈不冤哉夫佛稱世尊尊無二上也師表天人依怙幽顯非理孰為主張應權三界普度群靈非理孰為運周且理有自然安排已遠理有各當湊泊即乖不安排而有不湊泊而合此佛理之所以為妙也宋儒之所謂理不知果何物耶宋儒又謂佛云實際理地不受一塵佛事門中不舍一法他本自說得自所養者也正是差處便在這裏吾儒所養者是仁義理智他所養者只是視聽言動儒者則全體中自有許多道理各自有分別有是非他則只是見得個渾崙底物事無分別無是非少閒用處都羌吾儒只是一個真實道理他只認得人心無所謂道心吾儒說無不周無不遍他亦說無不周無不遍然人倫上不能周遍更說甚周遍夫存心養性養得成儒成佛儒佛皆有之但儒者存養在人倫事物而不免黏帶著實以故處置得世界停當而卒縛於世界之中佛氏存養亦不捨人倫事物而悟得妙有真空以故亦處置得世界停當而卒超於世界之外卒縛於世界之中故不斷生死卒超于世界之外故永免流浪儒所養者是仁義禮智得之矣他所養者只是視聽言動非也夫性無口眼廓然真如性無形相渾然大覺仁義禮智從事物理體而得名視聽言動從神識應用而立號雖俱是真性發現不過真性影子如來從真性全體不發不現處悟得豁然洞然復還清淨廣大妙湛圓明之本然後光明寂照包含普遍仁義禮智視聽言動一一皆合至理皆是妙用若即在仁義禮智視聽言動上存養性靈則是認影子以為本真失之遠矣謂全體中自有許多道理是也䫃儒者為有分別是非故逐於情識而昧渾崙物事佛氏為無分別是非故了悟渾崙物事而卒亦萬象森然含裹十方遍周沙界惟如來有之耳謂只見得渾崙物事用處都羌此尤昧性之談也天下惟此個渾崙物事無所不包含無所不森列如渾崙一個朗月遍映百川渾崙一個明鏡普現萬像若川川而覔一個月月何能周像像而安一個鏡鏡何能遍宋儒又謂釋氏之學與吾儒甚相似處如有物先天地無形本寂寥能為萬物主不逐四時凋又撲落非他物縱橫不是塵山河及大地全露法王身看他是甚麼樣見識又云此是法眼禪師下一泒宗旨如此今之禪家皆破其說以為有理路落窠臼礙正知見今多是麻三斤乾屎橛之說謂之不落窠臼不墮理路他說分明處却不是只內中這等一句黑如漆者便是緊要處嗚呼此難言矣古人兩偈理趣朗然宜儒者所會心也而禪門反破其說麻斤乾屎意味索然宜儒者所呵笑也而至人反拈其話頭何也然參前兩偈未必證道參後兩語往往有悟禪者此又何也咦自智慧之化而為識神也是非起分別熾然知見愈多性靈愈晦饒他說理分明語言玄妙盡是鬼家活計播弄精魂不如絶去名言掃空義理如攬虛空了無把捉如嚼玄水了無滋味將平日許多理路窠臼一頓掀都盡而中間止覺般若熏觀寂寂惺惺忽然如電光一閃蓮華乍開名為大悟良以禪家話頭正妙在無有意味無可攬嚼舍分別而得自在轉識神而成般若也若要說得義理疏通依舊落在卜度思議明時愈晦悟處轉迷矣六祖樵夫也以不識一字而疾得證悟阿難多聞總持人也以多聞掃盡而後悟真空良有以也一句黑如漆乃其所以朗於月者與宋儒又謂宋儒說佛自私二字得其要領又云佛氏自私昧道今以惡外物之心求照無物之地猶反鑑索照也又云明德而不能推之以新民可謂是自私有學佛者王天順與陸子靜辨論云我這佛法和耳目口鼻皆不愛要天下人各成佛豈得是自私子靜笑云得度天下人各成佛法卻是教他各各自私自私二字加於佛氏何其失之遠也佛氏修行翹勤而不閒寒暑精進而不舍晝夜持戒德而一塵不染行布施而四大都捐方求自度即懷度他由四衆以及六道衆生由同類而至含靈蠢動悉在拔救視如一子愛而𢌿以所樂名曰大慈哀而以所苦名曰大悲其所稱濟度者處世則教以忠孝仁慈德行無闕出世則教以涅槃解脫佛道圓成功濟三有而口不言恩化被群機而心不責報辟支獨覺則如來呵其小乘神僧自了則黃蘗欲斫雙足若斯之弘慈利物也生前利益衆生則儒者所有身後超度群品則儒者絶無是故生遭急難不呼宋儒而呼如來死懼沉淪不求周孔而求釋氏人心歸向有莫知其所以然者謂之自私可乎陸子靜乃謂度天下人各成佛法却是教他各各自私如此戲論則似出兒童之口矣豈有自私之人而能度盡天下豈有度盡天下而尚可謂之自私也如陸子言各各自私各各得度則天下無事矣又謂佛說萬理俱空吾儒說萬理俱實從此一方有公私義利之不同謂儒公義則可謂佛私利則不可佛頭目腦髓而不顧復將何私佛國城妻子而亦捐復將何利衆生之生作罪愆死歸淪墮正以實也謂萬理俱實執情太堅以至綱常倫理家國山河人民眷屬飲食男女是非毀譽富貴功名無一不實者執幻泡之身為金石之固坐晷之內營千歲之圖繫縛諸有長淪生死以此也如來愍焉乃以空救之又恐沉空滯寂入於偏枯又以有救之以空救有空為真空以有救空有為妙有帶枷鎖而罵纓絡沉苦海而笑彼岸惑亦甚矣其云以惡外物之心求照無物之地猶反鑑而索照也此言甚妙然非所以論佛也佛不喜物亦不惡物物去不追物來不避如懸大圓鏡於空中任萬像之來去如來之心遇空寂不作空寂想遇紛擾不作紛擾想遇歡喜不作歡喜想遇苦惱不作苦惱想以心御物不為物御以心轉境不為境轉一物不至而機常活萬物並作而中寂然無以洞之其照常含有以磨之其光彌瑩有以磨之其光彌瑩是為放光固為對鏡之稱無以洞之其照常含是為返照亦非反鑑之比蓋鑑反背則為死銅安能鑑物心返照則養靈幾安得復昏物自來去不可惡惡之一字即障心照自發生不必求求之一字即照不論有物無物矣迷人有物則喧為障無物則寂為障總之迷情也悟人無物則寂而照有物則照而寂總之悟境也故曰不論有物無物矣佛稱大覺金𠎣其所住處稱常寂光土言照也宋儒又有曰佛氏妄意天性而不知範圍天用反以六根之微因緣天地明不能盡則誣天地日月為幻妄蔽其用於一身之小溺其志於虛空之大是尤不知佛者也天性者佛謂之本覺一切衆生皆有佛性從本以來靈靈不昧了了常知無始迷倒不自覺悟欲成佛果須先了悟自家佛性後方稱性修習是性也謂之毗盧法界於中本具三世間四法界一切染淨諸法未有一法出此法界此是凡夫聖人根本之真心也故楞嚴經云當知虛空生汝心內猶如片雲點太清裏况諸世界在虛空耶又云不知色身外洎山河虛空大地咸是妙明真心中物又云一切世間諸所有物皆即菩提妙明真心此之真心一味絶待寂然清淨不生不滅不增不減似一顆圓淨明珠朗然清淨一切衆生從無始來不了此心妄見諸相猶如眼病橫見空花圓覺經云妄認四大為自身相六塵緣影為自心相譬彼病目見空中花又云譬如百千箇澄清大海不認但認一小浮漚若了四大之身緣慮之心緣生無性全是真心如了浮漚緣生無體全是海水維佛能了達此真性故能範圍天用日月星辰皆其安置山河大地皆其建立帝釋諸天皆其應權君師民物皆其現化自開闢以來世間一切事用何者非佛法之所興起五帝三王時佛名未顯佛法密持也至如六根之微因緣天地之大其理原自如此六根為情塵所染則為凡夫之六根形質固眇然至微六根不為情塵所染則為聖人之六根妙用熾然大起眼為天眼耳為天耳鼻如象王舌為廣長身為法身意通他心因緣天地何疑之有不見觀音大士冠二十五圓通妙三十二應現單從耳根入也觀耳則五根可知矣天地日月皆有神靈主之天趣所攝皆未悟真如以故劫運終時五衰相現三災並起與大地山河同稱幻𡚶非過也蓋苟悟真性則一切皆真佛理如是也謂一身之小自凡夫之四大而言謂虛空之大亦自凡夫之情見而論如來不爾如來證真如法身毗盧遮那遍一切處丈六金身猶為劣應安得謂蔽其用於一身之小也如來真心極其廣大虛空生心如片雲之點太清空生大覺如一漚之發大海安得謂溺其志於虛空之大也為此說者是全不知佛之地位者矣如來謂法身遍一切而宋儒詆其視身小如來謂虛空止一漚而宋儒詆其視空大是大相反也故曰全不知也宋儒謂佛家言禍福報應足以鉗制愚俗為資足衣食之計嗟乎如此老語則是因果報應乃後世行腳乞食衲子專為衣食計者倡為此說不知此乃釋迦金口宣言楞嚴諸經歷歷道明釋迦棄王位出家何愁無衣食倡此以鉗制愚俗而恐嚇取資也即如易經作善降祥作惡降殃語聖人亦以此鉗制人而為衣食資耶天地有司過之神紏察之吏善惡罪福如影隨形花果二報毛髮不爽業力太重佛不能消撥無因果地獄如箭而謂造此以鉗制愚俗亦弗思甚矣夫報應之理顯然人尚怙終不畏若以為佛家妄作亦復何憚而不為垂世立教之大儒恐不當如是也宋儒又謂孔孟所謂天佛家所謂道佛何嘗以天為道哉佛之所謂道無名相無形色無內外無終始大包沙界細入微芒建立乾坤陶鑄人物立萬刻之範圍為千聖之命脉天地不足喻其廣日月不足比其耀水火不能為之殃鬼神不能窺其祕金剛摩尼未免著迹毗盧般若亦是強名天之一字豈足當之也佛以天分欲界色界無色界為三種天欲界以十善而感生尚牽欲愛梵天以梵行而升濟未證菩提極之而非非想報盡還來其中惟五那含名為不退天趣如此佛何嘗以為道也佛既名超三界為天人師則欽若昊天祗承上帝此儒者之事非佛之事也宋儒又謂佛只認得個人心無所謂道心不知佛之所最呵者人心所最修者道心也有善無惡是道佛心則纖惡盡去萬善同歸有淨無染是道佛心則一塵不染萬德圓淨有體有用是道佛心則一真不妄妙應無方有寂有照是道佛心則寂而常照照而常寂以性相不住為宗以事理無礙為則佛全是覺覺全是道乃至人心名為識神名為染法六根妄用八識熾然生死根因三途種子佛之所以精勤修行單為去此如目中之翳必抉而後快謂只認得人心豈知佛者哉宋儒又謂嘗見畫底諸師人物皆雄偉宜其傑然有立如此富貴利達聲色貨利如何籠絡得他住余謂宋儒皮相者諸師建立豈在容貌雄偉既知聲色貨利等籠絡不得則其風操可貴而其道必有可尊何以力詆之為佛云無上士調御丈夫大雄氏彼皆振世豪傑退步而入佛門了生死視世間之英雄固自天壤即後世祖位諸師亦並非凡人不屑作一世之功名而建萬劫不壞之事業宋儒詆之可謂蚍蜉撼大樹且昔賢不考佛理而觀氣貌不信如來而信諸師何也皮相如此假令得見如來三十二相八十種好其醉心又當何如矣
