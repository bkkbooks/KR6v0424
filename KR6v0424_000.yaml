front:
  text: 佛法金湯序或疑護大法而以金湯命名是自峻其城塹而拒之人也恐儒者起而堅其執曰我法能植五常順萬有之自然窮理盡性以至于命亦足矣何佛氏之是從也老氏者流亦起而堅其執曰我法卑讓不先虛無窅冥煉久飛升得以長存亦至矣何必佛氏之是從也是愈固其鼎足之勢故聖人存而不辨也是則不然凡所以有言者為信者發為智者發此二種人非必其即生我法之中可自異而歸同者也憍陳如舍利弗等其初皆諸梵志師卒為如來大弟子者其智足移而信可鼓也如來非自徇我相必欲伸己之是也理如是也性如是也佛之稱由外道衆生對峙而得名也若無衆生即無佛也猶儒者仁義禮智之教對姦盜詐偽而得名也若無四惡即無四善也儒道雖善不了義法也佛善且不貪著何有于惡是了義法也了則極盡而無餘不處神識之界不了則沉空而醉有終歸輪轉之卿第道術有不了人之性未有不可了者也苟具有信智即處儒者之中而未嘗以宋儒之言為然也即奉道者之教而未嘗即以莊老之言為至也其終守其師説而傲然不從者未具信智之人也鴻苞居士儒者也宋儒之言其所幻而讀者也彼豈不知儒而必排之又豈不知佛而必欲遵信崇奉之誠深見其有所可而有所不可也餘雖未敢諛鴻苞居士皆悟後之談然其融通教乘稱性排答發新知而非為臆説循舊論而不病耳餐亦一代時教之宗工護持佛法之太匠也或具有信智者得因是編獲其本心歸命大覺則鴻苞居士之功當不在張無盡楊大年諸尊宿輩下矣其闡提人雖佛神力亦不能度况我輩乎當置之弗論萬曆壬寅春王正月補陀山西嵓谷沙門真一和南書
